<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- TipTally App Icon - Piggy bank in #00ff88 on dark -->
  <rect width="1024" height="1024" rx="224" fill="#080808"/>

  <g transform="translate(512, 480)">
    <!-- Piggy body -->
    <circle cx="0" cy="0" r="260" fill="none" stroke="#00ff88" stroke-width="40" stroke-linecap="round"/>

    <!-- Coin slot on top -->
    <rect x="-50" y="-272" width="100" height="14" rx="7" fill="white"/>

    <!-- Coin -->
    <circle cx="0" cy="-310" r="48" fill="white"/>

    <!-- Dollar sign on coin -->
    <text x="0" y="-296" text-anchor="middle" font-family="monospace" font-weight="700" font-size="52" fill="#080808">$</text>

    <!-- Snout -->
    <ellipse cx="-195" cy="20" rx="58" ry="42" fill="none" stroke="#00ff88" stroke-width="30" stroke-linecap="round"/>

    <!-- Snout dots -->
    <circle cx="-208" cy="12" r="8" fill="#00ff88"/>
    <circle cx="-182" cy="12" r="8" fill="#00ff88"/>

    <!-- Ear -->
    <path d="M -90 -230 L -50 -165 L -130 -165 Z" fill="#00ff88"/>

    <!-- Eye -->
    <circle cx="-60" cy="-50" r="14" fill="white"/>

    <!-- Tail -->
    <path d="M 260 -40 Q 310 -65 300 -10 Q 290 45 320 20" fill="none" stroke="#00ff88" stroke-width="24" stroke-linecap="round"/>

    <!-- Front legs -->
    <line x1="-110" y1="240" x2="-110" y2="295" stroke="white" stroke-width="30" stroke-linecap="round"/>
    <line x1="110" y1="240" x2="110" y2="295" stroke="white" stroke-width="30" stroke-linecap="round"/>
  </g>
</svg>
