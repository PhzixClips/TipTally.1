<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" width="1284" height="2778">
  <!-- TipTally Splash Screen -->
  <rect width="1284" height="2778" fill="#080808"/>

  <g transform="translate(642, 1250)">
    <!-- Piggy body -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#00ff88" stroke-width="32" stroke-linecap="round"/>

    <!-- Coin slot -->
    <rect x="-40" y="-210" width="80" height="12" rx="6" fill="white"/>

    <!-- Coin -->
    <circle cx="0" cy="-240" r="38" fill="white"/>

    <!-- Dollar sign on coin -->
    <text x="0" y="-228" text-anchor="middle" font-family="monospace" font-weight="700" font-size="42" fill="#080808">$</text>

    <!-- Snout -->
    <ellipse cx="-150" cy="15" rx="45" ry="32" fill="none" stroke="#00ff88" stroke-width="24" stroke-linecap="round"/>

    <!-- Snout dots -->
    <circle cx="-160" cy="10" r="6" fill="#00ff88"/>
    <circle cx="-140" cy="10" r="6" fill="#00ff88"/>

    <!-- Ear -->
    <path d="M -70 -175 L -40 -125 L -100 -125 Z" fill="#00ff88"/>

    <!-- Eye -->
    <circle cx="-45" cy="-38" r="11" fill="white"/>

    <!-- Tail -->
    <path d="M 200 -30 Q 240 -50 235 -5 Q 230 40 250 20" fill="none" stroke="#00ff88" stroke-width="20" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="-85" y1="185" x2="-85" y2="225" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <line x1="85" y1="185" x2="85" y2="225" stroke="white" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- App name -->
  <text x="642" y="1580" text-anchor="middle" font-family="'Courier New', monospace" font-weight="700" font-size="72" fill="#00ff88" letter-spacing="12">TIPTALLY</text>
  <text x="642" y="1620" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#555" letter-spacing="6">TIP &amp; SHIFT TRACKER</text>
</svg>
