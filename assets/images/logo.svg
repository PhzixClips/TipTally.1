<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Piggy bank logo - White and Green (#00ff88) on dark background -->
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#080808"/>

  <!-- Piggy body (main circle) -->
  <circle cx="256" cy="275" r="130" fill="none" stroke="#00ff88" stroke-width="22" stroke-linecap="round"/>

  <!-- Coin slot on top -->
  <rect x="230" y="138" width="52" height="8" rx="4" fill="#00ff88"/>

  <!-- Coin (circle on top) -->
  <circle cx="256" cy="120" r="24" fill="#00ff88"/>

  <!-- Snout -->
  <ellipse cx="160" cy="285" rx="30" ry="22" fill="none" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>

  <!-- Ear (triangle) -->
  <path d="M 210 168 L 230 200 L 190 200 Z" fill="#00ff88"/>

  <!-- Tail (curl on right) -->
  <path d="M 386 255 Q 410 240 405 265 Q 400 290 415 275" fill="none" stroke="#00ff88" stroke-width="14" stroke-linecap="round"/>

  <!-- Front legs -->
  <line x1="200" y1="395" x2="200" y2="420" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>
  <line x1="310" y1="395" x2="310" y2="420" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>

  <!-- App name -->
  <text x="256" y="475" text-anchor="middle" font-family="monospace" font-weight="700" font-size="36" fill="white" letter-spacing="6">TIPTALLY</text>
</svg>
